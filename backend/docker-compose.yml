version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: leaduser
      POSTGRES_PASSWORD: leadpassword
      POSTGRES_DB: leadengine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leaduser -d leadengine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - API_KEY=${API_KEY}
      - DATABASE_URL=postgresql://leaduser:leadpassword@db:5432/leadengine
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS=true
      - CORS_ORIGINS=${CORS_ORIGINS:-https://leadscraper.freelanceleadsapp.tech,http://localhost:3000}
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker_discovery:
    build:
      context: .
      dockerfile: Dockerfile
    command: rq worker discovery --url redis://redis:6379/0 --with-scheduler
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - API_KEY=${API_KEY}
      - DATABASE_URL=postgresql://leaduser:leadpassword@db:5432/leadengine
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "from redis import Redis; r=Redis.from_url('redis://redis:6379/0'); r.ping(); import rq; workers=rq.Worker.all(connection=r); assert any(w.state != 'idle' or True for w in workers), 'no workers'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2

  worker_details:
    build:
      context: .
      dockerfile: Dockerfile
    command: rq worker details --url redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - API_KEY=${API_KEY}
      - DATABASE_URL=postgresql://leaduser:leadpassword@db:5432/leadengine
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "from redis import Redis; Redis.from_url('redis://redis:6379/0').ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 6

  worker_analysis:
    build:
      context: .
      dockerfile: Dockerfile
    command: rq worker analysis --url redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - API_KEY=${API_KEY}
      - DATABASE_URL=postgresql://leaduser:leadpassword@db:5432/leadengine
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "from redis import Redis; Redis.from_url('redis://redis:6379/0').ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2

volumes:
  postgres_data:
  redis_data:
