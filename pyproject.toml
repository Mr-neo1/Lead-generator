[tool.ruff]
# Ruff configuration for Lead Engine backend
target-version = "py312"
line-length = 100
src = ["backend"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "S",   # flake8-bandit (security)
    "LOG", # flake8-logging
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "S101",   # Use of assert (fine in tests)
    "S603",   # subprocess.run without shell=True (false positives with playwright)
    "S108",   # Probable insecure usage of temp file
    "B008",   # Do not perform function calls in default arguments (FastAPI pattern)
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["S", "B"]  # relax security + bugbear rules in tests
"backend/seed.py" = ["S"]

[tool.ruff.lint.isort]
known-first-party = ["database", "models", "schemas", "config", "tasks"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["backend"]
omit = [
    "backend/tests/*",
    "backend/seed.py",
    "backend/migrate.py",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 50
